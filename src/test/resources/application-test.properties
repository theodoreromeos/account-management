spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

spring.liquibase.enabled=true
spring.liquibase.contexts=test

# LOGS
logging.level.org.hibernate.SQL=warn
logging.level.liquibase=info

# OAUTH2
spring.security.oauth2.client.registration.mobility-api.client-secret=test-secret
spring.security.oauth2.client.provider.auth-server.token-uri=http://localhost:9999/fake/token
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9999/fake/jwks
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9999/fake

# gRPC
grpc.client.auth-server.address=static://localhost:9999

